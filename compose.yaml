services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: "8080"
      REDIS_URL: redis://redis:6379
      SMTP_URL: ${SMTP_URL}
      SMTP_FROM: ${SMTP_FROM}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      KMS_BACKEND: local
      EMAIL_HASH_SALT_FILE: /run/secrets/email_hash_salt
      KMS_KEY_FILE: /run/secrets/kms_key
      LOG_LEVEL: info
    secrets:
      # mode 0o444 so the non-root `node` user inside the container can read
      # these. They're still only readable, never writable.
      - source: kms_key
        target: kms_key
        mode: 0o444
      - source: email_hash_salt
        target: email_hash_salt
        mode: 0o444
    depends_on:
      redis:
        condition: service_healthy
    # Backend is only reachable over the internal compose network.
    # All external traffic must flow through the frontend nginx so CSP /
    # security headers / rate limits at the proxy are consistently applied.
    # (To expose for local curl debugging, bind to 127.0.0.1 explicitly:
    #   ports: ["127.0.0.1:8080:8080"])
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TURNSTILE_SITEKEY: ${TURNSTILE_SITEKEY}
        VITE_API_BASE: /api
        VITE_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    ports:
      - "8081:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: docker.io/redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

secrets:
  kms_key:
    file: ./secrets/kms_key
  email_hash_salt:
    file: ./secrets/email_hash_salt

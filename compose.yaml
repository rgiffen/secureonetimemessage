services:
  backend:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: "8080"
      REDIS_URL: redis://redis:6379
      SMTP_URL: ${SMTP_URL:-}
      SMTP_FROM: ${SMTP_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      KMS_BACKEND: local
      EMAIL_HASH_SALT_FILE: /run/secrets/email_hash_salt
      KMS_KEY_FILE: /run/secrets/kms_key
      LOG_LEVEL: info
    # Read-only bind mounts for the local KMS wrapping key and the email-hash
    # HMAC salt. Using a bind mount (rather than the Compose `secrets:` block)
    # because podman-compose silently ignores the `mode` field on secrets,
    # leaving them 0400 root:root inside the container and unreadable by the
    # non-root `node` user. Host files should be chmod 0644; the parent dir
    # (./secrets or ~/project/secrets) is 0700 so external users can't traverse.
    # `:Z` applies an SELinux relabel so the container (container_t) can read
    # files that normally carry a user_home_t context on RHEL/Fedora hosts.
    volumes:
      - ./secrets/kms_key:/run/secrets/kms_key:ro,Z
      - ./secrets/email_hash_salt:/run/secrets/email_hash_salt:ro,Z
    depends_on:
      redis:
        condition: service_healthy
    # Backend is only reachable over the internal compose network.
    # All external traffic must flow through the frontend nginx so CSP /
    # security headers / rate limits at the proxy are consistently applied.
    # (To expose for local curl debugging, bind to 127.0.0.1 explicitly:
    #   ports: ["127.0.0.1:8080:8080"])
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TURNSTILE_SITEKEY: ${TURNSTILE_SITEKEY}
        VITE_API_BASE: /api
        VITE_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    ports:
      - "8081:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: docker.io/redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
      - --maxmemory-policy
      - allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

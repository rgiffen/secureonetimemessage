<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>SecureDrop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      // F-18a: first-executing script extracts the fragment and scrubs it
      // from the URL bar before any other script (analytics, extensions) can read it.
      (function () {
        try {
          var hash = window.location.hash;
          if (hash && hash.length > 1) {
            window.__SECUREDROP_K_LINK__ = hash.slice(1);
            window.history.replaceState(null, "", window.location.pathname + window.location.search);
          }
        } catch (e) {
          // best-effort
        }
      })();
    </script>
  </head>
  <body class="bg-background text-on-background font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
